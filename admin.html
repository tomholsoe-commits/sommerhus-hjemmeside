<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Kalenderoversigt</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.7;
      color: #3a3a3a;
      background-color: #e3f2fd;
    }

    /* Login skærm */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-box {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    .login-box h1 {
      color: #5a6b4d;
      margin-bottom: 1.5rem;
      text-align: center;
      font-size: 1.8rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #5a6b4d;
      font-weight: 500;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #eef2e8;
      border-radius: 4px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #8ba876;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background-color: #8ba876;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #7a9863;
    }

    .error-message {
      color: #d32f2f;
      text-align: center;
      margin-top: 1rem;
      display: none;
    }

    /* Admin panel */
    .admin-panel {
      display: none;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .admin-header h1 {
      color: #5a6b4d;
      font-size: 2rem;
    }

    .logout-btn {
      padding: 0.5rem 1rem;
      background-color: #d32f2f;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .logout-btn:hover {
      background-color: #b71c1c;
    }

    /* Kalender */
    .calendar-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .calendar-header h2 {
      color: #5a6b4d;
      font-size: 1.5rem;
    }

    .calendar-nav {
      display: flex;
      gap: 1rem;
    }

    .calendar-nav button {
      padding: 0.5rem 1rem;
      background-color: #eef2e8;
      color: #5a6b4d;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: background-color 0.2s;
    }

    .calendar-nav button:hover {
      background-color: #d4e0c4;
    }

    .calendar {
      width: 100%;
      border-collapse: collapse;
    }

    .calendar th {
      background-color: #5a6b4d;
      color: white;
      padding: 1rem;
      text-align: center;
      font-weight: 500;
    }

    .calendar td {
      border: 1px solid #eef2e8;
      padding: 1rem;
      text-align: center;
      height: 100px;
      vertical-align: top;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .calendar td:hover {
      background-color: #f5f5f5;
    }

    .calendar td.other-month {
      background-color: #fafafa;
      color: #ccc;
    }

    .calendar td.ledig {
      background-color: #c8e6c9;
    }

    .calendar td.optaget {
      background-color: #ffcdd2;
    }

    .calendar td.today {
      border: 3px solid #8ba876;
    }

    .date-number {
      font-weight: bold;
      color: #3a3a3a;
      display: block;
      margin-bottom: 0.5rem;
    }

    .date-status {
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* Booking form */
    .booking-form {
      background: #f5f5f5;
      padding: 1.5rem;
      border-radius: 4px;
      margin-top: 2rem;
    }

    .booking-form h3 {
      color: #5a6b4d;
      margin-bottom: 1rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    input[type="date"],
    select {
      padding: 0.75rem;
      border: 2px solid #eef2e8;
      border-radius: 4px;
      font-size: 1rem;
    }

    input[type="date"]:focus,
    select:focus {
      outline: none;
      border-color: #8ba876;
    }

    .form-row-full {
      grid-column: 1 / -1;
    }

    /* Legende */
    .legend {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 2px solid #eef2e8;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .legend-color {
      width: 30px;
      height: 30px;
      border-radius: 4px;
    }

    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        gap: 1rem;
      }

      .calendar-nav {
        margin-top: 1rem;
      }

      .calendar td {
        padding: 0.5rem;
        height: auto;
        font-size: 0.9rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .legend {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Login skærm -->
  <div class="login-container" id="loginScreen">
    <div class="login-box">
      <h1>Admin Login</h1>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="password">Adgangskode:</label>
          <input type="password" id="password" required placeholder="Indtast adgangskode">
        </div>
        <button type="submit">Log ind</button>
        <div class="error-message" id="errorMessage">Forkert adgangskode</div>
      </form>
    </div>
  </div>

  <!-- Admin panel -->
  <div class="admin-panel" id="adminPanel">
    <div class="admin-header">
      <h1>Kalenderoversigt</h1>
      <button class="logout-btn" onclick="handleLogout()">Log ud</button>
    </div>

    <div class="calendar-container">
      <div class="calendar-header">
        <h2 id="monthYear"></h2>
        <div class="calendar-nav">
          <button onclick="previousMonth()">← Forrige</button>
          <button onclick="todayMonth()">I dag</button>
          <button onclick="nextMonth()">Næste →</button>
        </div>
      </div>

      <table class="calendar" id="calendarTable">
        <thead>
          <tr>
            <th>Man</th>
            <th>Tir</th>
            <th>Ons</th>
            <th>Tor</th>
            <th>Fre</th>
            <th>Lør</th>
            <th>Søn</th>
          </tr>
        </thead>
        <tbody id="calendarBody"></tbody>
      </table>

      <div class="legend">
        <div class="legend-item">
          <div class="legend-color" style="background-color: #c8e6c9;"></div>
          <span>Ledig</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background-color: #ffcdd2;"></div>
          <span>Optaget</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background-color: #fafafa;"></div>
          <span>Anden måned</span>
        </div>
      </div>

      <div class="booking-form">
        <h3>Tilføj eller rediger booking</h3>
        <div class="form-row">
          <div>
            <label for="startDate">Start dato:</label>
            <input type="date" id="startDate">
          </div>
          <div>
            <label for="endDate">Slut dato:</label>
            <input type="date" id="endDate">
          </div>
        </div>
        <div class="form-row">
          <div>
            <label for="guestName">Gæstenavn:</label>
            <input type="text" id="guestName" placeholder="Navn på gæst">
          </div>
          <div>
            <label for="status">Status:</label>
            <select id="status">
              <option value="optaget">Optaget</option>
              <option value="ledig">Ledig</option>
            </select>
          </div>
        </div>
        <div class="form-row form-row-full">
          <button type="button" onclick="saveBooking()">Gem booking</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Konstanter
    const ADMIN_PASSWORD = "admin123"; // Ændr dette til en sikker adgangskode
    const STORAGE_KEY = "housebookings";

    // Initialisering
    let currentDate = new Date();
    let bookings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    // Login-håndtering
    function handleLogin(event) {
      event.preventDefault();
      const password = document.getElementById('password').value;
      
      if (password === ADMIN_PASSWORD) {
        localStorage.setItem('adminLoggedIn', 'true');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        renderCalendar();
      } else {
        document.getElementById('errorMessage').style.display = 'block';
        document.getElementById('password').value = '';
      }
    }

    function handleLogout() {
      localStorage.removeItem('adminLoggedIn');
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('password').value = '';
      document.getElementById('errorMessage').style.display = 'none';
    }

    // Kalender-funktioner
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      // Opdater måned/år
      const monthNames = ['Januar', 'Februar', 'Marts', 'April', 'Maj', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'December'];
      document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;
      
      // Få første dag og antal dage i måneden
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();
      
      // Start dag er mandag (1) i stedet for søndag (0)
      const startDay = firstDay === 0 ? 6 : firstDay - 1;
      
      const calendarBody = document.getElementById('calendarBody');
      calendarBody.innerHTML = '';
      
      let date = 1;
      let nextMonthDate = 1;
      
      for (let i = 0; i < 6; i++) {
        const row = document.createElement('tr');
        
        for (let j = 0; j < 7; j++) {
          const cell = document.createElement('td');
          
          if (i === 0 && j < startDay) {
            // Forrige måneds dage
            cell.classList.add('other-month');
            cell.textContent = daysInPrevMonth - startDay + j + 1;
          } else if (date > daysInMonth) {
            // Næste måneds dage
            cell.classList.add('other-month');
            cell.textContent = nextMonthDate++;
          } else {
            // Denne måneds dage
            const fullDate = new Date(year, month, date);
            const dateString = formatDate(fullDate);
            
            // Tjek om det er i dag
            const today = new Date();
            if (fullDate.toDateString() === today.toDateString()) {
              cell.classList.add('today');
            }
            
            // Tjek bookingstatus
            const booking = bookings.find(b => b.date === dateString);
            if (booking) {
              cell.classList.add(booking.status);
            } else {
              cell.classList.add('ledig');
            }
            
            cell.innerHTML = `<span class="date-number">${date}</span>`;
            if (booking) {
              cell.innerHTML += `<span class="date-status">${booking.guestName || ''}</span>`;
            }
            
            date++;
          }
          
          row.appendChild(cell);
        }
        
        calendarBody.appendChild(row);
        if (date > daysInMonth) break;
      }
    }

    function previousMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    }

    function todayMonth() {
      currentDate = new Date();
      renderCalendar();
    }

    function formatDate(date) {
      return date.toISOString().split('T')[0];
    }

    function saveBooking() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const guestName = document.getElementById('guestName').value;
      const status = document.getElementById('status').value;
      
      if (!startDate || !endDate) {
        alert('Vælg både start- og slutdato');
        return;
      }
      
      // Fjern tidligere bookinger for disse datoer
      const start = new Date(startDate);
      const end = new Date(endDate);
      
      bookings = bookings.filter(b => {
        const bookingDate = new Date(b.date);
        return !(bookingDate >= start && bookingDate <= end);
      });
      
      // Tilføj nye bookinger for hver dag
      let currentBookingDate = new Date(start);
      while (currentBookingDate <= end) {
        bookings.push({
          date: formatDate(currentBookingDate),
          status: status,
          guestName: guestName
        });
        currentBookingDate.setDate(currentBookingDate.getDate() + 1);
      }
      
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bookings));
      
      // Nulstil form
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      document.getElementById('guestName').value = '';
      document.getElementById('status').value = 'optaget';
      
      renderCalendar();
      alert('Booking gemt!');
    }

    // Initialiser
    window.addEventListener('load', () => {
      const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      if (isLoggedIn) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        renderCalendar();
      }
    });
  </script>

</body>
</html>
